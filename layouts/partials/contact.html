{{ partial "global-header.html" . }}

<!-- contact form start -->
{{ with .Site.Params.contact }}
<section id="contact-form">
  <div class="container">
      <div id="contact-box" class="row">
          <div class="col-sm-12 text-center">
            <div class="block">
    
              <h2>{{ .box.title }}</h2>
              <ul class="address-block">
                <li>
                 <i class="fa fa-envelope-o"></i>{{ .box.email }}
                </li>
              </ul>
              <ul class="social-icons">
              {{ range .social }}  
                <li>
                  <a href="{{ .url }}"><i class="fa {{ .icon }}"></i></a>
                </li>
              {{ end }}
              </ul>
            </div>
          </div>
        </div>

    <div class="row">
      <div class="col-md-6 col-sm-12">
        <div class="block">
          <form name="contact" method="POST" data-netlify="true"  action="/thanks" >
             
             <div class="form-group">  
              <p>
                <label> <input type="text" name="name" class="form-control" placeholder="{{ .form.name }}" /></label>   
              </p>
              </div>
              <div class="form-group">
              <p>
                <label>  <input type="email" name="email" class="form-control" placeholder="{{ .form.email }}" /></label>
              </p>
              </div>  
              <div class="form-group">
               <p>
                <label>  <input type="text" name="email" class="form-control" placeholder="{{ .form.subject }}" /></label>
               </p>
              </div>  
           </form>
        </div>
      </div>
      <div class="col-md-6 col-sm-12">
        <div class="block">
           <form  name="contact" method="POST" data-netlify="true" >
            <div class="form-group-2">
              <textarea class="form-control" name="message"  rows="3" placeholder="{{ .form.message }}"></textarea>
            </div>
            <button class="btn btn-default" type="submit">{{ .form.button }}</button>
          </form>
        </div>
      </div>
    </div>
     
     <form name="contacter" method="POST" data-netlify="true">
  <p>
    <label>Your Name: <input type="text" name="name" /></label>   
  </p>
  <p>
    <label>Your Email: <input type="email" name="email" /></label>
  </p>
  <p>
    <label>Your Role: <select name="role[]" multiple>
      <option value="leader">Leader</option>
      <option value="follower">Follower</option>
    </select></label>
  </p>
  <p>
    <label>Message: <textarea name="message"></textarea></label>
  </p>
  <p>
    <button type="submit">Send</button>
  </p>
</form>

    
  </div>
</section>
{{ end }}
