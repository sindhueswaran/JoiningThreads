{{ partial "global-header.html" . }}

<!-- contact form start -->
{{ with .Site.Params.contact }}
<section id="contact-form">
  <div class="container">
      <div id="contact-box" class="row">
          <div class="col-sm-12 text-center">
            <div class="block">
    
              <h2>{{ .box.title }}</h2>
              <ul class="address-block">
                  <li>
                      <i class="fa fa-envelope-o"></i>{{ .box.email }}
                    </li>
              
              </ul>
              <ul class="social-icons">
              {{ range .social }}  
                <li>
                  <a href="{{ .url }}"><i class="fa {{ .icon }}"></i></a>
                </li>
              {{ end }}
              </ul>
            </div>
          </div>
        </div>

    <div class="row">
      <div class="col-md-6 col-md-offset-3 col-sm-12">
        <div class="block">
          <form name="contactus" method="POST" data-netlify="true" action= "/thanks">
            <div class="form-group">
              <input type="text" name="name" class="form-control" placeholder="{{ .form.name }}" />
            </div>
            <div class="form-group">
              <input type="email"  name="email" class="form-control" placeholder="{{ .form.email }}" />
            </div>
            <div class="form-group">
              <input type="text" name="subject" class="form-control" placeholder="{{ .form.subject }}" />
            </div>
            <div class="form-group-2">
              <textarea name="message" class="form-control" rows="3" placeholder="{{ .form.message }}"></textarea>
            </div>
            <button class="btn btn-default" type="submit">{{ .form.button }}</button>
          </form>
        </div>
      </div>
     
      </div>
    </div>
     
    
  </div>
</section>
{{ end }}
