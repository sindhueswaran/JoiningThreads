{{ partial "global-header.html" . }}

{{ if .Site.Data.donate.enable }}
<!-- donate Start -->
<section id="donate">
  <div class="container">

    <!-- Intro -->
    <div class="row">
      <div class="section-title">
        <h2>{{ .Site.Data.donate.title }}</h2>
        <p>{{ .Site.Data.donate.subtitle }}</p>
      </div>
    </div>

    <!-- Content -->
    <div class="row">
      {{ range .Site.Data.donate.content }}
      <div class="col-sm-6 col-md-3">
        <div class="donate-item">
        <!--  <i class="{{ .icon }}"></i> -->
        <div class="img-container"> <img class="img-responsive doicon" src=" {{ .img }}" /> </div>
           <h4>{{ .name }}</h4>
          <p>{{ .text }}</p>
        </div>
      </div>
      {{ end }}
    </div>
  </div>
</section>
{{ end }}
