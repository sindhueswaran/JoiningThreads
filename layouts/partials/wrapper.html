<!-- Wrapper Start -->
<section id="intro"  >
  <div class="container" >
    <div class="row">
      <div class="col-sm-12">
        <div class="block">
          <div class="section-title" >
            <h2>{{ .Site.Params.wrapper.title }}</h2>
           <!--<p>{{ .Site.Params.wrapper.italic }}</p>  -->
          </div>

    <div class="container" >
        <div class="card-group vgr-cards col-md-12 col-md-offset-1">
            {{ range .Site.Data.work.portfolio }}
            <div class="card">
                <div class="card-img-body col-md-4">
                  <img class="card-img" src="{{ $.Site.BaseURL }}{{ .image }}" alt="Card image cap" style="padding-top: 20px;">
                </div>
                  <div class="card-body col-md-6  ">
                <h4 class="card-title">{{ .name }}</h4>
                <p class="card-text">{{ .description }}</p>           
              </div>
            </div> 
          {{ end }} 
        </div>
      </div>  
    </div>
  </div>
</section>
